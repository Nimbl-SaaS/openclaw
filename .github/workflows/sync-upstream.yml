name: Sync fork with upstream

on:
  schedule:
    # Every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    name: Sync Nimbl-SaaS/openclaw with openclaw/openclaw main
    runs-on: ubuntu-latest
    steps:
      - name: Sync fork via GitHub API
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const result = await github.rest.repos.mergeUpstream({
              owner: context.repo.owner,
              repo: context.repo.repo,
              branch: 'main',
            });
            const status = result.data.merge_type;
            if (status === 'none') {
              core.info('Fork is already up to date with upstream.');
            } else {
              core.info(`Fork synced via ${status}.`);
            }
